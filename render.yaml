services:
  - type: web
    name: filmmaking-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: naqaab
      - key: CORS_ORIGINS
        value: https://filmmaking.onrender.com

  - type: web
    name: filmmaking
    env: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://filmmaking-backend.onrender.com
